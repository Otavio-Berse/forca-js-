<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Jogo da Forca JS</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Jogo da Forca</h1>

        <div id="forca" class="forca"></div>

        <h2 id="palavra"></h2>

        <input
            type="text"
            id="letra"
            maxlength="1">

        <button onclick="tentarLetra()">
            Tentar
        </button>

        <p>
            Erros:
            <span id="erros">0</span>
        </p>

        <p>
            Letras erradas:
            <span id="erradas"></span>
        </p>

        <p>
            Vitórias:
            <span id="vitorias">0</span>
        </p>

        <p>
            Derrotas:
            <span id="derrotas">0</span>
        </p>

        <p id="mensagem"></p>

        <button onclick="novoJogo()">
            Novo Jogo
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
